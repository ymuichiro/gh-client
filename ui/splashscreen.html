<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gh-client loading</title>
    <script>
      (() => {
        const KEY = "gh-client-theme-mode";
        let theme = "light";
        try {
          const stored = window.localStorage.getItem(KEY);
          if (stored === "light" || stored === "dark") {
            theme = stored;
          } else if (
            typeof window.matchMedia === "function" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
          ) {
            theme = "dark";
          }
        } catch (_error) {
          // Ignore storage read errors.
        }

        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
      }

      :root[data-theme="dark"] {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
      }

      body {
        display: grid;
        place-items: center;
        font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
        background: #f1f1f1;
        color: #141414;
      }

      :root[data-theme="dark"] body {
        background: #080808;
        color: #f4f4f4;
      }

      .startup-shell {
        min-width: 320px;
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 26px 30px;
        border-radius: 16px;
        border: 1px solid rgba(20, 20, 20, 0.16);
        background: rgba(255, 255, 255, 0.9);
      }

      :root[data-theme="dark"] .startup-shell {
        border-color: rgba(244, 244, 244, 0.2);
        background: rgba(16, 16, 16, 0.9);
      }

      .startup-mark {
        width: 58px;
        height: 58px;
        border-radius: 16px;
        border: 1px solid currentColor;
        display: grid;
        place-items: center;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

      .startup-title {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
      }

      .startup-subtitle {
        margin: 0;
        font-size: 0.82rem;
        opacity: 0.72;
      }

      .startup-progress {
        width: 180px;
        height: 3px;
        border-radius: 999px;
        background: rgba(18, 18, 18, 0.15);
        overflow: hidden;
      }

      :root[data-theme="dark"] .startup-progress {
        background: rgba(244, 244, 244, 0.18);
      }

      .startup-progress::after {
        content: "";
        display: block;
        height: 100%;
        width: 42%;
        border-radius: inherit;
        background: currentColor;
        animation: progress 1.05s ease-in-out infinite;
      }

      @keyframes progress {
        0% {
          transform: translateX(-120%);
          opacity: 0.6;
        }

        50% {
          opacity: 1;
        }

        100% {
          transform: translateX(300%);
          opacity: 0.6;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .startup-progress::after {
          animation-duration: 2.6s;
        }
      }
    </style>
  </head>
  <body>
    <main class="startup-shell" aria-live="polite" aria-busy="true">
      <div class="startup-mark" aria-hidden="true">gh</div>
      <p class="startup-title">gh-client</p>
      <p class="startup-subtitle">Loading workspace...</p>
      <div class="startup-progress" aria-hidden="true"></div>
    </main>
  </body>
</html>
