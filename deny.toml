[graph]
all-features = true

[advisories]
version = 2
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
  "AGPL-3.0-only",
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
