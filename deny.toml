[graph]
all-features = true

[advisories]
version = 2
ignore = [
  # Transitive through tauri/urlpattern; no maintained replacement path available in current tauri stack.
  "RUSTSEC-2024-0370", # proc-macro-error (transitive)
  "RUSTSEC-2024-0411", # gtk-rs GTK3 stack (transitive via tauri/wry)
  "RUSTSEC-2024-0412",
  "RUSTSEC-2024-0413",
  "RUSTSEC-2024-0414",
  "RUSTSEC-2024-0415",
  "RUSTSEC-2024-0416",
  "RUSTSEC-2024-0417",
  "RUSTSEC-2024-0418",
  "RUSTSEC-2024-0419",
  "RUSTSEC-2024-0420",
  "RUSTSEC-2025-0057", # fxhash (transitive)
  "RUSTSEC-2025-0075", # unic-char-range
  "RUSTSEC-2025-0080", # unic-common
  "RUSTSEC-2025-0081", # unic-char-property
  "RUSTSEC-2025-0098", # unic-ucd-version
  "RUSTSEC-2025-0100", # unic-ucd-ident
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
  "AGPL-3.0-only",
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "MPL-2.0",
  "Unicode-3.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
